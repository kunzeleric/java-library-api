spring.application.name=library-api
spring.datasource.url=jdbc:postgresql://localhost:5432/library-db
spring.datasource.username=postgres
spring.datasource.password=postgres

# determine how schemas are created or updated
spring.jpa.hibernate.ddl-auto=update
# display SQL statements in logs
spring.jpa.show-sql=true
# use specific postgres sql syntax when building queries
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect